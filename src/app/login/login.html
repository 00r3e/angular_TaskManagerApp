<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Login to your account</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="loginUser.email"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="loginUser.password"
          required
        />
      </div>

      <button
        class="login-btn"
        type="submit"
        [disabled]="!loginForm.valid"
      >
        Login
      </button>

      <!-- SIMPLE REGISTER BUTTON -->
      <button
        type="button"
        class="register-btn"
        (click)="goToRegister()"
      >
        Create Account
      </button>

    </form>

  </div>
</div>
